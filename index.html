  <style>
:root {
  --bg: #fbf7fb;
  --card: #ffffff;
  --text: #231f24;
  --muted: #6f6573;
  --border: #eaddec;
  --accent: #7c3aed;
  --accent-soft: #f0e7ff;
  --ok: #15803d;
  --ok-bg: #dcfce7;
  --bad: #b91c1c;
  --bad-bg: #fee2e2;
}
* { box-sizing: border-box; }
body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: radial-gradient(circle at top, #fff 0, var(--bg) 52%, #f5ecf7 100%); color: var(--text); }
.container { width: min(980px, calc(100% - 28px)); margin: 0 auto; padding: 28px 0 42px; }
header { text-align: center; margin-bottom: 18px; }
h1 { margin: 0 0 8px; font-size: clamp(1.8rem, 4vw, 3rem); }
.subtitle { margin: 0 auto; max-width: 740px; color: var(--muted); line-height: 1.45; }
.card { background: rgba(255, 255, 255, 0.92); border: 1px solid var(--border); border-radius: 24px; box-shadow: 0 18px 45px rgba(61, 43, 76, 0.10); padding: clamp(16px, 3vw, 28px); }
.topbar { display: flex; justify-content: space-between; gap: 12px; color: var(--muted); font-weight: 700; margin-bottom: 12px; }
.progress { height: 10px; background: #efe5f2; border-radius: 999px; overflow: hidden; margin-bottom: 18px; }
#progressFill { height: 100%; width: 0%; background: var(--accent); transition: width .25s ease; }
.imageWrap { background: #fff; border: 1px solid var(--border); border-radius: 18px; padding: 12px; display: grid; place-items: center; margin-bottom: 18px; }
.imageWrap img { max-width: 100%; max-height: 62vh; object-fit: contain; border-radius: 12px; }
.prompt { font-size: 1.15rem; margin: 8px 0 14px; font-weight: 800; }
.options { display: grid; gap: 10px; }
.option { width: 100%; border: 1px solid var(--border); border-radius: 16px; padding: 13px 14px; background: #fff; color: var(--text); cursor: pointer; text-align: left; font-size: 1rem; display: flex; align-items: center; gap: 12px; transition: transform .12s ease, border-color .12s ease, background .12s ease; }
.option:hover:not(:disabled) { transform: translateY(-1px); border-color: var(--accent); background: var(--accent-soft); }
.option:disabled { cursor: default; opacity: 0.96; }
.letter { display: inline-grid; place-items: center; min-width: 32px; height: 32px; border-radius: 999px; background: #f4eef7; font-weight: 900; }
.option.correct { border-color: var(--ok); background: var(--ok-bg); }
.option.wrong { border-color: var(--bad); background: var(--bad-bg); }
.feedback { min-height: 28px; margin: 14px 0; font-weight: 800; }
.feedback.ok { color: var(--ok); }
.feedback.bad { color: var(--bad); }
.actions { display: flex; justify-content: flex-end; gap: 10px; }
button.primary, button.secondary { border: 0; border-radius: 14px; padding: 12px 18px; font-weight: 900; cursor: pointer; }
button.primary { background: var(--accent); color: #fff; }
button.primary:disabled { opacity: .45; cursor: not-allowed; }
button.secondary { background: var(--accent-soft); color: var(--accent); }
.hidden { display: none; }
.finalScore { font-size: 2.5rem; font-weight: 1000; margin: 12px 0; color: var(--accent); }
.mistake { display: grid; grid-template-columns: 110px 1fr; gap: 12px; align-items: center; border: 1px solid var(--border); border-radius: 14px; padding: 10px; margin: 10px 0; background: #fff; }
.mistake img { width: 110px; height: 82px; object-fit: cover; border-radius: 10px; border: 1px solid var(--border); }
.perfect { font-weight: 900; }
footer { text-align: center; color: var(--muted); margin-top: 16px; font-size: .95rem; }
@media (max-width: 640px) { .topbar { flex-direction: column; } .mistake { grid-template-columns: 1fr; } .mistake img { width: 100%; height: 160px; } }

  </style>
</head>
<body>

      <div id="feedback" class="feedback"></div>
      <div class="actions">

      </div>
    </section>

    <section id="final" class="card hidden">
      <h2>Resultado final</h2>

      <div id="review"></div>

    </section>

    <footer>Feito para treino de identificação de lâminas. ♡○♡Yasss♡○♡.</footer>

let order = [];
let current = 0;
let score = 0;
let answered = false;
let mistakes = [];

const $ = (id) => document.getElementById(id);

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  order = shuffleArray(QUESTIONS);
  current = 0;
  score = 0;
  mistakes = [];
  $('final').classList.add('hidden');
  $('quiz').classList.remove('hidden');
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = order[current];
  $('counter').textContent = `Questão ${current + 1} de ${order.length}`;
  $('score').textContent = `Acertos: ${score}`;
  $('progressFill').style.width = `${(current / order.length) * 100}%`;
  $('slideImage').src = q.image;
  $('slideImage').alt = `Lâmina histológica da questão ${current + 1}`;
  $('feedback').textContent = '';
  $('feedback').className = 'feedback';
  $('nextBtn').disabled = true;

  const options = shuffleArray(q.options);
  const box = $('options');
  box.innerHTML = '';
  options.forEach((option, index) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.type = 'button';
    btn.innerHTML = `<span class="letter">${String.fromCharCode(65 + index)}</span><span>${option}</span>`;
    btn.onclick = () => chooseOption(btn, option, q.answer);
    box.appendChild(btn);
  });
}

function chooseOption(button, selected, answer) {
  if (answered) return;
  answered = true;
  const all = document.querySelectorAll('.option');
  all.forEach(btn => btn.disabled = true);

  if (selected === answer) {
    score++;
    button.classList.add('correct');
    $('feedback').textContent = 'Acertou, doutora. Essa lâmina te respeitou hoje.';
    $('feedback').classList.add('ok');
  } else {
    button.classList.add('wrong');
    all.forEach(btn => {
      if (btn.textContent.includes(answer)) btn.classList.add('correct');
    });
    mistakes.push({question: current + 1, image: order[current].image, selected, answer});
    $('feedback').textContent = `Errou: era ${answer}. Sem drama, histologia também tem seus dias de vilã.`;
    $('feedback').classList.add('bad');
  }
  $('score').textContent = `Acertos: ${score}`;
  $('nextBtn').disabled = false;
}

function nextQuestion() {
  current++;
  if (current >= order.length) return finishQuiz();
  renderQuestion();
}

function finishQuiz() {
  $('quiz').classList.add('hidden');
  $('final').classList.remove('hidden');
  $('progressFill').style.width = '100%';
  const pct = Math.round((score / order.length) * 100);
  $('finalScore').textContent = `${score}/${order.length} (${pct}%)`;
  const review = $('review');
  review.innerHTML = '';
  if (mistakes.length === 0) {
    review.innerHTML = '<p class="perfect">Gabaritou. Pode entrar no laboratório em câmera lenta.</p>';
  } else {
    const title = document.createElement('h3');
    title.textContent = 'Revisar erros';
    review.appendChild(title);
    mistakes.forEach(m => {
      const item = document.createElement('div');
      item.className = 'mistake';
      item.innerHTML = `<img src="${m.image}" alt="Lâmina errada"><div><b>Sua resposta:</b> ${m.selected}<br><b>Correta:</b> ${m.answer}</div>`;
      review.appendChild(item);
    });
  }
}

$('nextBtn').addEventListener('click', nextQuestion);
$('restartBtn').addEventListener('click', startQuiz);
